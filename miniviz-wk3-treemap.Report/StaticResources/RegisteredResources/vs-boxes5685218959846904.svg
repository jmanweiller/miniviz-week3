<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="vsbxHalftone" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#ffffff" opacity="0.6"></circle>
    </pattern>
    <filter id="vsbxHardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000000" flood-opacity="1"></feDropShadow>
    </filter>
    <filter id="vsbxTextShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#000000" flood-opacity="1"></feDropShadow>
    </filter>
  </defs>

  
  <rect x="0" y="0" width="480" height="240" rx="12" ry="12" fill="#FF3B30"></rect>
  
  <rect x="2" y="2" width="476" height="236" rx="10" ry="10" fill="none" stroke="#000000" stroke-width="4"></rect>

  
  <g transform="translate(240, 120)" opacity="0.85">
    <g fill="#FFD60A" stroke="#000" stroke-width="1.5" stroke-linejoin="miter">
      
      <polygon points="0,0 260,-90 260,-80"></polygon>
      <polygon points="0,0 260,-50 260,-40"></polygon>
      <polygon points="0,0 260,-12 260,-2"></polygon>
      <polygon points="0,0 260,26 260,36"></polygon>
      <polygon points="0,0 260,64 260,74"></polygon>
      <polygon points="0,0 260,102 260,112"></polygon>

      <polygon points="0,0 -260,-90 -260,-80"></polygon>
      <polygon points="0,0 -260,-50 -260,-40"></polygon>
      <polygon points="0,0 -260,-12 -260,-2"></polygon>
      <polygon points="0,0 -260,26 -260,36"></polygon>
      <polygon points="0,0 -260,64 -260,74"></polygon>
      <polygon points="0,0 -260,102 -260,112"></polygon>
    </g>
  </g>

  
  <rect x="0" y="0" width="480" height="240" rx="12" ry="12" fill="url(#vsbxHalftone)" opacity="0.4"></rect>

  
  <g transform="translate(80, 120) rotate(-4)" filter="url(#vsbxHardShadow)">
    
    <rect x="-78" y="-80" width="156" height="160" fill="#000000"></rect>
    
    <rect x="-72" y="-76" width="144" height="152" fill="#ffffff"></rect>
    
    <rect x="-72" y="-76" width="144" height="36" fill="#0a0e1a"></rect>
    <text x="0" y="-52" font-family="&#39;Bangers&#39;,&#39;Anton&#39;,&#39;Impact&#39;,&#39;Arial Black&#39;,sans-serif" font-size="22" fill="#FFD60A" letter-spacing="2.5" text-anchor="middle">
      CRITICS
    </text>
    
    <rect x="-60" y="-28" width="120" height="92" fill="none" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="4 4"></rect>
  </g>

  
  <g transform="translate(400, 120) rotate(4)" filter="url(#vsbxHardShadow)">
    <rect x="-78" y="-80" width="156" height="160" fill="#000000"></rect>
    <rect x="-72" y="-76" width="144" height="152" fill="#ffffff"></rect>
    <rect x="-72" y="-76" width="144" height="36" fill="#0a0e1a"></rect>
    <text x="0" y="-52" font-family="&#39;Bangers&#39;,&#39;Anton&#39;,&#39;Impact&#39;,&#39;Arial Black&#39;,sans-serif" font-size="22" fill="#FFD60A" letter-spacing="2.5" text-anchor="middle">
      FANS
    </text>
    <rect x="-60" y="-28" width="120" height="92" fill="none" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="4 4"></rect>
  </g>

  
  <g transform="translate(240, 120) rotate(-8)" filter="url(#vsbxTextShadow)">
    
    <polygon points="-58,-32 60,-38 64,30 -54,36" fill="#0a0e1a"></polygon>
    <text x="-26" y="22" font-family="&#39;Bangers&#39;,&#39;Anton&#39;,&#39;Impact&#39;,&#39;Arial Black&#39;,sans-serif" font-size="72" fill="#FFD60A" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 5;">V</text>
    <text x="28" y="22" font-family="&#39;Bangers&#39;,&#39;Anton&#39;,&#39;Impact&#39;,&#39;Arial Black&#39;,sans-serif" font-size="72" fill="#FFD60A" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 5;">S</text>
  </g>

  
  <g stroke="#000" stroke-width="1.4">
    <polygon points="0,-7 2,-2 7,-2 3,2 4,8 0,5 -4,8 -3,2 -7,-2 -2,-2" fill="#FFD60A" transform="translate(28,28) scale(1.3)"></polygon>
    <polygon points="0,-7 2,-2 7,-2 3,2 4,8 0,5 -4,8 -3,2 -7,-2 -2,-2" fill="#ffffff" transform="translate(456,212) scale(1.3)"></polygon>
    <polygon points="0,-7 2,-2 7,-2 3,2 4,8 0,5 -4,8 -3,2 -7,-2 -2,-2" fill="#FFD60A" transform="translate(452,40) scale(1.0)"></polygon>
    <polygon points="0,-7 2,-2 7,-2 3,2 4,8 0,5 -4,8 -3,2 -7,-2 -2,-2" fill="#ffffff" transform="translate(28,212) scale(1.0)"></polygon>
  </g>
</svg>