    <polygon points="&#xA;      0,-44  14,-22  40,-32  28,-10  58,-4  30,6  46,28  16,22  14,46  -4,24&#xA;      -28,38 -22,12 -52,12 -26,0 -42,-22 -16,-16 -16,-44 0,-24&#xA;    " fill="#FF3B30"></polygon>
    
    <polygon points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5" fill="#ffffff"></polygon>
  </g>

  
  <g transform="translate(1200, 540)" opacity="0.95">
