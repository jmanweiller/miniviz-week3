<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" preserveAspectRatio="xMidYMid meet">
  <defs>
    
    <pattern id="halftoneSmall" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1" fill="#ffffff" opacity="0.18"></circle>
    </pattern>
    <pattern id="halftoneMed" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="2" fill="#FFD60A" opacity="0.45"></circle>
    </pattern>
    <pattern id="halftoneRed" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1.8" fill="#FF2D55" opacity="0.55"></circle>
    </pattern>
    <pattern id="halftoneCyan" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.5" fill="#00D4FF" opacity="0.5"></circle>
    </pattern>

    
    <pattern id="speedLines" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect x="0" y="0" width="1.2" height="22" fill="#ffffff" opacity="0.07"></rect>
    </pattern>

    
    <radialGradient id="cornerGlowYellow" cx="0%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#FFD60A" stop-opacity="0.42"></stop>
      <stop offset="60%" stop-color="#FF8A00" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#FF8A00" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="cornerGlowMagenta" cx="100%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#FF2D92" stop-opacity="0.38"></stop>
      <stop offset="55%" stop-color="#7B1FA2" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#7B1FA2" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="titleBurst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD60A" stop-opacity="0.95"></stop>
      <stop offset="70%" stop-color="#FF8A00" stop-opacity="0.85"></stop>
      <stop offset="100%" stop-color="#FF3B30" stop-opacity="0.9"></stop>
    </radialGradient>

    <radialGradient id="bgVignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#161a2e" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#070912" stop-opacity="1"></stop>
    </radialGradient>

    
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.55"></feDropShadow>
    </filter>
    <filter id="hardOutline" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000000" flood-opacity="1"></feDropShadow>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"></feDropShadow>
    </filter>
    <clipPath id="titlePanelClip">
      <rect x="32" y="30" width="950" height="88" rx="8" ry="8"></rect>
    </clipPath>
  </defs>

  
  <rect width="1280" height="720" fill="url(#bgVignette)"></rect>

  
  <rect width="1280" height="720" fill="url(#cornerGlowYellow)"></rect>
  <rect width="1280" height="720" fill="url(#cornerGlowMagenta)"></rect>

  
  <rect width="1280" height="720" fill="url(#speedLines)"></rect>

  
  <g opacity="0.55">
    <rect x="0" y="0" width="520" height="320" fill="url(#halftoneMed)" mask="url(#fadeTL)"></rect>
    <rect x="780" y="420" width="500" height="300" fill="url(#halftoneRed)" mask="url(#fadeBR)"></rect>
    <rect x="900" y="0" width="380" height="260" fill="url(#halftoneCyan)" mask="url(#fadeTR)"></rect>
  </g>

  <defs>
    <mask id="fadeTL">
      <radialGradient id="m1" cx="0%" cy="0%" r="100%">
        <stop offset="0%" stop-color="#fff"></stop>
        <stop offset="100%" stop-color="#000"></stop>
      </radialGradient>
      <rect width="520" height="320" fill="url(#m1)"></rect>
    </mask>
    <mask id="fadeBR">
      <radialGradient id="m2" cx="100%" cy="100%" r="100%">
        <stop offset="0%" stop-color="#fff"></stop>
        <stop offset="100%" stop-color="#000"></stop>
      </radialGradient>
      <rect width="500" height="300" fill="url(#m2)"></rect>
    </mask>
    <mask id="fadeTR">
      <radialGradient id="m3" cx="100%" cy="0%" r="100%">
        <stop offset="0%" stop-color="#fff"></stop>
        <stop offset="100%" stop-color="#000"></stop>
      </radialGradient>
      <rect width="380" height="260" fill="url(#m3)"></rect>
    </mask>
  </defs>

  
  <g opacity="0.7">
    <circle cx="60" cy="700" r="2" fill="#FFD60A"></circle>
    <circle cx="1240" cy="40" r="1.5" fill="#00D4FF"></circle>
